# Netlify configuration for Yea I Consulting

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Serve index.html for root
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Clean URLs - allow /insights to work as /insights.html
[[redirects]]
  from = "/insights"
  to = "/insights.html"
  status = 200

[[redirects]]
  from = "/diagnostic"
  to = "/diagnostic.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to = "/cookies.html"
  status = 200

[[redirects]]
  from = "/insights/is-your-business-ready-for-ai"
  to = "/insights/is-your-business-ready-for-ai.html"
  status = 200

[[redirects]]
  from = "/insights/ai-tools-already-in-your-software-stack"
  to = "/insights/ai-tools-already-in-your-software-stack.html"
  status = 200

[[redirects]]
  from = "/insights/why-ai-pilots-fail"
  to = "/insights/why-ai-pilots-fail.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
